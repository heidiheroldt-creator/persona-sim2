                  bottomLine: extract(text, 'BOTTOM LINE:', null)                                                                                                                                           
              };                                                                                                                                                                                            
          }                                                                                                                                                                                                 
                                                                                                                                                                                                            
          function extract(text, start, end) {                                                                                                                                                              
              const startIdx = text.indexOf(start);                                                                                                                                                         
              if (startIdx === -1) return '';                                                                                                                                                               
              const contentStart = startIdx + start.length;                                                                                                                                                 
              const endIdx = end ? text.indexOf(end, contentStart) : text.length;                                                                                                                           
              return text.substring(contentStart, endIdx !== -1 ? endIdx : text.length).trim()                                                                                                              
                  .replace(/^["'\[\]]+|["'\[\]]+$/g, '');                                                                                                                                                   
          }                                                                                                                                                                                                 
                                                                                                                                                                                                            
          function showError(error) {                                                                                                                                                                       
              document.getElementById('results').innerHTML = `                                                                                                                                              
                  <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-lg">                                                                                                                          
                      <h3 class="text-lg font-bold text-red-800 mb-2">❌ Error</h3>                                                                                                                         
                      <p class="text-sm text-red-700">${error.message}</p>                                                                                                                                  
                  </div>                                                                                                                                                                                    
              `;                                                                                                                                                                                            
              document.getElementById('results').classList.remove('hidden');                                                                                                                                
          }                                                                                                                                                                                                 
      </script>                                                                                                                                                                                             
  </body>                                                                                                                                                                                                   
  </html>
